<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hanamark</title>
  <link rel="stylesheet" href="styles/base.css" />
</head>
<body>
  <!-- ツールバー -->
  <div id="toolbar">
    <button id="btn-open" data-i18n="btnOpen">開く</button>
    <select id="theme-select">
      <!-- JS で動的に追加 -->
    </select>
    <select id="lang-select">
      <!-- JS で動的に追加 -->
    </select>
    <button id="btn-print" data-i18n="btnPrint">印刷</button>
    <span id="file-name"></span>
  </div>
  <!-- 検索バー -->
  <div id="search-bar">
    <input type="text" id="search-input" placeholder="検索... (Ctrl+F)" autocomplete="off" />
    <span id="search-count"></span>
    <button id="search-prev" title="前へ (Shift+Enter)">↑</button>
    <button id="search-next" title="次へ (Enter)">↓</button>
    <button id="search-close" title="閉じる (Esc)">✕</button>
  </div>

  <!-- Markdown コンテンツ表示エリア -->
  <main id="content">
    <div id="welcome">
      <h2>🌸 hanamark</h2>
      <p data-i18n="welcomeMsg">Markdown ファイルを開いてください</p>
    </div>
  </main>

  <script src="i18n.js"></script>
  <script src="renderer.js"></script>
  <script src="search.js"></script>
  <script src="main.js"></script>
</body>
</html>
